name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Check formatting
        run: ruff format --check .
      - name: Test
        run: pytest
      - name: Smoke test
        run: >-
          python -m eval_delta examples/baseline.jsonl examples/candidate.jsonl
          --slice-field metadata.language --min-slice-size 3
          --max-regression 1.0 --format json
